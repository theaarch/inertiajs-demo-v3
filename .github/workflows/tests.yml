name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout Inertia v3
        run: git clone --branch 3.x --depth 1 https://github.com/inertiajs/inertia.git ../inertia

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Build Inertia v3 Packages
        working-directory: ../inertia
        run: |
          pnpm install --frozen-lockfile
          pnpm build:all

      - name: Install Dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          npm ci

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Setup Database
        run: |
          touch database/database.sqlite
          php artisan migrate --force

      - name: Generate Wayfinder Routes
        run: php artisan wayfinder:generate --no-interaction

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Build Assets
        run: npm run build

      - name: Tests
        run: php artisan test --parallel
